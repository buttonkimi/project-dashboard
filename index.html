<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專案儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #23262d; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'DM Sans', sans-serif; }
  .dash { color: #fefae0; padding: 24px; border-radius: 16px; width: 340px; }
  .dash-title { font-size: 13px; font-weight: 500; color: #c8c4a8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .dash-subtitle { font-size: 11px; color: #9a967e; margin-bottom: 24px; }
  .metric-card { background: #809671; border-radius: 12px; padding: 20px 24px; margin-bottom: 12px; }
  .metric-value { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 500; color: #fefae0; line-height: 1; margin-bottom: 6px; }
  .metric-label { font-size: 13px; color: #d4d9c8; }
  .progress-bar-wrap { background: #6a7d5e; border-radius: 99px; height: 6px; margin-top: 12px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: #fefae0; transition: width 1.2s ease; }
  .overdue { color: #f87171 !important; }
  .updated { font-size: 10px; color: #6b7280; text-align: right; margin-top: 8px; }
</style>
</head>
<body>
<div class="dash">
  <div class="dash-title">專案儀表板</div>
  <div class="dash-subtitle">Project Dashboard · 掌握當前工程進度與完工狀態</div>
  <div class="metric-card">
    <div class="metric-value" id="pct">—</div>
    <div class="metric-label">完工進度</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="bar" style="width:0%"></div>
    </div>
  </div>
  <div class="metric-card">
    <div class="metric-value" id="days">—</div>
    <div class="metric-label">剩餘天數</div>
  </div>
  <div class="updated" id="updated"></div>
</div>
<script>
  const WEBHOOK_URL = 'https://pureness-design.zeabur.app/webhook/project-progress';

  async function fetchData() {
    try {
      const res = await fetch(WEBHOOK_URL);
      const data = await res.json();
      const pct = Math.round(data.progress || 0);
      const days = parseInt(data.days_remaining || 0);
      document.getElementById('pct').textContent = pct + '%';
      document.getElementById('bar').style.width = Math.min(pct, 100) + '%';
      if (days >= 0) {
        document.getElementById('days').textContent = days + ' 天';
        document.getElementById('days').classList.remove('overdue');
      } else {
        document.getElementById('days').textContent = '已逾期 ' + Math.abs(days) + ' 天';
        document.getElementById('days').classList.add('overdue');
      }
      document.getElementById('updated').textContent = '更新時間：' + new Date().toLocaleString('zh-TW');
    } catch (e) {
      document.getElementById('pct').textContent = '—';
      document.getElementById('days').textContent = '—';
    }
  }

  fetchData();
  setInterval(fetchData, 60000);
</script>
</body>
</html>
